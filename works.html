<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botanical Art | Esra Gomceli Ozgun</title>
  <meta name="description" content="Botanical art by Esra Gomceli Ozgun — watercolour paintings, drawings, and nature logbook." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <a href="index.html" class="site-title">Esra Gomceli Ozgun</a>
    <p class="site-subtitle">the logbook for a botanical, architectural, theoretical, philosophical journey</p>

    <div class="header-social">
      <a href="contact.html" class="social-icon mail" aria-label="Email">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
        </svg>
      </a>
      <a href="https://www.instagram.com/" target="_blank" rel="noopener" class="social-icon instagram" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="#444"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ===== NAVIGATION ===== -->
  <nav class="site-nav">
    <a href="works.html" class="active">Botanical Art</a>
    <a href="teaching.html">Teaching</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- ===== MAIN ===== -->
  <main>
    <div class="container">

      <!-- Three works cards -->
      <section style="padding: 2.5rem 0 1rem;">
        <div class="works-cards">

          <a href="logbook.html" class="works-card">
            <img
              src="images/works/logbook/flower-shapes.jpg"
              alt="Nature Logbook"
              class="works-card-img"
            />
            <div class="works-card-label">Logbook</div>
          </a>

          <a href="draw.html" class="works-card">
            <img
              src="images/works/draw/pomegranate.jpg"
              alt="Botanical Drawings"
              class="works-card-img"
            />
            <div class="works-card-label">Draw</div>
          </a>

          <a href="paint.html" class="works-card">
            <img
              src="images/works/paint/cedar.jpg"
              alt="Watercolour Paintings"
              class="works-card-img"
            />
            <div class="works-card-label">Paint</div>
          </a>

        </div>
      </section>

      <!-- Quote -->
      <div class="works-quote">
        <p>"Art does not reproduce the visible but makes visible."&ensp;Paul Klee</p>
      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>© 2025 by Esra Gomceli Ozgun</p>
  </footer>

</html>
