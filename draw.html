<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draw | Botanical Art | Esra Gomceli Ozgun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <a href="index.html" class="site-title">Esra Gomceli Ozgun</a>
    <p class="site-subtitle">the logbook for a botanical, architectural, theoretical, philosophical journey</p>

    <div class="header-social">
      <a href="contact.html" class="social-icon mail" aria-label="Email">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
        </svg>
      </a>
      <a href="https://www.instagram.com/" target="_blank" rel="noopener" class="social-icon instagram" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="#444"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ===== NAVIGATION ===== -->
  <nav class="site-nav">
    <a href="works.html" class="active">Botanical Art</a>
    <a href="teaching.html">Teaching</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- ===== MAIN ===== -->
  <main>
    <div class="container">
      <div class="gallery-page-header">
        <a href="works.html" class="gallery-back">← Botanical Art</a>
        <h1>Draw</h1>
      </div>

      <div class="photo-grid" id="draw-gallery">
        <img src="images/works/draw/pomegranate.jpg"     alt="Pomegranate 2016"       data-gallery="draw" />
        <img src="images/works/draw/passiflora.jpg"      alt="Passiflora 2017"        data-gallery="draw" />
        <img src="images/works/draw/umbrella-plant.jpg"  alt="Umbrella Plant 2020"    data-gallery="draw" />
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>© 2025 by Esra Gomceli Ozgun</p>
  </footer>

  <!-- ===== LIGHTBOX ===== -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Previous">&#8249;</button>
    <div class="lightbox-inner">
      <img src="" alt="" id="lb-img" />
    </div>
    <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Next">&#8250;</button>
  </div>

  <script>
    (function () {
      var currentIdx = 0;
      var currentSet = [];

      function openLightbox(imgs, idx) {
        currentSet = imgs;
        currentIdx = idx;
        showImage();
        document.getElementById('lightbox').classList.add('open');
      }

      function showImage() {
        document.getElementById('lb-img').src = currentSet[currentIdx].src;
        document.getElementById('lb-img').alt = currentSet[currentIdx].alt;
      }

      var allImgs = Array.from(document.querySelectorAll('#draw-gallery img'));
      allImgs.forEach(function (img, i) {
        img.addEventListener('click', function () { openLightbox(allImgs, i); });
      });

      document.getElementById('lb-close').addEventListener('click', function () {
        document.getElementById('lightbox').classList.remove('open');
      });
      document.getElementById('lb-prev').addEventListener('click', function () {
        currentIdx = (currentIdx - 1 + currentSet.length) % currentSet.length;
        showImage();
      });
      document.getElementById('lb-next').addEventListener('click', function () {
        currentIdx = (currentIdx + 1) % currentSet.length;
        showImage();
      });
      document.getElementById('lightbox').addEventListener('click', function (e) {
        if (e.target === this) this.classList.remove('open');
      });
      document.addEventListener('keydown', function (e) {
        var lb = document.getElementById('lightbox');
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') lb.classList.remove('open');
        if (e.key === 'ArrowLeft') { currentIdx = (currentIdx - 1 + currentSet.length) % currentSet.length; showImage(); }
        if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % currentSet.length; showImage(); }
      });
    })();
  </script>

</body>
</html>
